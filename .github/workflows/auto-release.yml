name: Auto release DMG repack

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_URL: ${{ vars.UPSTREAM_URL || 'https://persistent.oaistatic.com/codex-app-prod/Codex.dmg' }}
  STATE_FILE: ${{ vars.STATE_FILE || 'upstream.sha256' }}

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:

      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          fetch-depth: 0

      - name: Install tooling
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed \
            git curl p7zip nodejs npm python python-pip python-setuptools \
            base-devel libarchive github-cli

      - name: Ensure scripts are executable
        run: |
          set -euo pipefail
          chmod +x repack.sh
          chmod +x scripts/*.sh

      - name: Check upstream
        id: check
        run: |
          set -euo pipefail
          scripts/check_upstream.sh

      - name: Skip when no upstream change
        if: steps.check.outputs.changed != 'true'
        run: echo "No upstream change detected."

      - name: Build release artifacts
        if: steps.check.outputs.changed == 'true'
        id: build
        env:
          HOME: /root
        run: |
          set -euo pipefail
          scripts/build_release_artifacts.sh

      - name: Publish GitHub release
        if: steps.check.outputs.changed == 'true'
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          APPIMAGE_PATH: ${{ steps.build.outputs.appimage_path }}
          APP_VERSION: ${{ steps.check.outputs.app_version }}
          UPSTREAM_SHA256: ${{ steps.check.outputs.upstream_sha256 }}
        run: |
          set -euo pipefail
          scripts/publish_release.sh

      - name: Debug workspace before commit
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          pwd
          ls -la
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          ls -la "${GITHUB_WORKSPACE}" || true
          ls -la "${GITHUB_WORKSPACE}/.git" || true

      - name: Commit upstream sha256 state
        if: steps.check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: ${{ github.workspace }}
          commit_message: "chore: update upstream sha256 to ${{ steps.check.outputs.upstream_sha256 }}"
          file_pattern: ${{ env.STATE_FILE }}
          branch: ${{ github.ref_name }}
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
